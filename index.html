<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Dwyer Capital - Family Investment Office</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #1a4d2e;
            --secondary-green: #2d6a4f;
            --accent-gold: #d4a574;
            --dark-gold: #c9965f;
            --light-bg: #f9f8f6;
            --white: #ffffff;
            --text-dark: #333333;
            --text-gray: #666666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: var(--white);
            overflow-x: hidden;
        }

        a {
            color: var(--accent-gold);
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: var(--dark-gold);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* ===== HEADER ===== */
        header {
            background: var(--white);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
            overflow-x: auto;
        }

        .logo-container {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            min-width: 200px;
        }

        .logo-container img {
            height: 60px;
            width: auto;
        }

        nav {
            display: flex;
            gap: 40px;
            margin-left: auto;
            flex-shrink: 0;
        }

        nav a {
            color: var(--text-dark);
            font-weight: 500;
            font-size: 15px;
            position: relative;
            white-space: nowrap;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: width 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--secondary-green) 100%);
            padding: 80px 30px;
            text-align: center;
            color: var(--white);
        }

        .hero-content {
            max-width: 100%;
            margin: 0 auto;
        }

        .hero-logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
            overflow: visible;
            width: 100%;
            padding: 0 10px;
        }

        .hero-logo {
            width: auto;
            height: 280px;
            animation: slideDown 0.7s ease-out;
        }

        .hero h2 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
            font-weight: 300;
            line-height: 1.7;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 45px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid var(--accent-gold);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--primary-green);
        }

        .btn-primary:hover {
            background: var(--dark-gold);
            border-color: var(--dark-gold);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-gold);
        }

        .btn-secondary:hover {
            background: var(--accent-gold);
            color: var(--primary-green);
        }

        /* ===== FEATURES SECTION ===== */
        .features {
            padding: 100px 50px;
            background: var(--light-bg);
        }

        .features-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            margin-bottom: 70px;
        }

        .section-title h2 {
            font-size: 40px;
            color: var(--primary-green);
            margin-bottom: 15px;
        }

            font-size: 18px;
            color: var(--t
