name: Daily Article Publisher

# Runs Monday through Friday at 8am UTC
on:
  schedule:
    - cron: '0 8 * * 1-5'  # Monday-Friday at 8:00 AM UTC
  workflow_dispatch:  # Allow manual triggers

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run article analyzer
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          echo "Starting article analyzer..."
          echo "API Key status: ${NEWSAPI_KEY:+Set (length: ${#NEWSAPI_KEY})}"
          python article_analyzer.py 2>&1
          echo "Article analyzer completed"
          echo "Checking for generated files..."
          ls -la *.html 2>/dev/null || echo "No HTML files generated"
          echo "Checking articles_data.json..."
          ls -la articles_data.json 2>/dev/null || echo "articles_data.json not modified"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Daily article publication - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git main

      - name: Deployment notification
        if: always()
        run: |
          echo "Article publication completed at $(date)"
