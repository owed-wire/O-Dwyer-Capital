name: Daily Article Publisher

# Runs Monday through Friday at 8am UTC
on:
  schedule:
    - cron: '0 8 * * 1-5'  # Monday-Friday at 8:00 AM UTC
  workflow_dispatch:  # Allow manual triggers

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run article analyzer
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python article_analyzer.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Daily article publication - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push

      - name: Deployment notification
        if: always()
        run: |
          echo "Article publication completed at $(date)"
