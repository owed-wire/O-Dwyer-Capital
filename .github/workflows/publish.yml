name: Daily Article Publisher

# Runs Monday through Friday. Scheduled early and on an odd minute to reduce
# GitHub's scheduled-run queue lag (jobs on :00/:30 wait the longest). The job
# still typically lands 30 min - 2 hrs later than the cron time under load.
on:
  schedule:
    - cron: '17 12 * * 1-5'  # 12:17 UTC = ~8:17 AM EDT / 7:17 AM EST, Mon-Fri
  workflow_dispatch:  # Allow manual triggers

# Grant write permissions to the workflow
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run article analyzer
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "================================"
          echo "Starting article analyzer..."
          echo "API Key present: ${NEWSAPI_KEY:+YES}"
          echo "API Key length: ${#NEWSAPI_KEY}"
          echo "================================"
          python article_analyzer.py 2>&1 | tee analyzer_output.txt
          echo ""
          echo "================================"
          echo "Analyzer output saved to analyzer_output.txt"
          cat analyzer_output.txt
          echo "================================"
          echo "Checking for new files..."
          ls -la *-*.html 2>/dev/null || echo "No new HTML files generated"
          echo "Checking articles_data.json..."
          ls -la articles_data.json 2>/dev/null || echo "articles_data.json not modified"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Daily article publication - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git main

      - name: Deployment notification
        if: always()
        run: |
          echo "Article publication completed at $(date)"
